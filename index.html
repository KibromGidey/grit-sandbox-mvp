<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIT Sandbox MVP - Phase 2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GRIT Sandbox</h1>
    <p>Gamified, Reputation, Individualized, Talent Sandbox</p>
  </header>

  <main class="layout">
    <section class="card input-card">
      <h2>Student Profile / Resume</h2>
      <textarea id="resume" placeholder="Paste resume or student profile here..."></textarea>

      <h2>Target Job Description</h2>
      <textarea id="job" placeholder="Paste job description here..."></textarea>

      <button id="runAllBtn">Run All Agents</button>
      <p id="status"></p>
    </section>

    <section class="card agent-card">
      <h2>AI Agents</h2>
      <div class="agent-buttons">
        <button data-agent="translator">1. Translator</button>
        <button data-agent="talent">2. Talent</button>
        <button data-agent="curriculum">3. Curriculum</button>
        <button data-agent="advising">4. Advising</button>
        <button data-agent="generator">5. Generator</button>
        <button data-agent="discriminator">6. Discriminator</button>
        <button data-agent="reputation">7. Reputation</button>
      </div>
      <div id="results" class="results">
        <p>Agent outputs will appear here.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Phase 2 prototype: multi-agent workflow.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
